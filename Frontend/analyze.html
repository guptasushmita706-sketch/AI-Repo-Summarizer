<section class="analyze">

    <h1>Analyze GitHub Repository</h1>

    <p>Paste any public GitHub Repository URL below.</p>

    <input
        type="text"
        id="repoUrl"
        placeholder="https://github.com/username/repository">

    <br><br>

    <button onclick="analyzeRepo()">
        Analyze Repository
    </button>

    <div class="tips">
        <h3>Supported Repositories</h3>

        <ul>
            <li>✔ Public GitHub Repositories</li>
            <li>✔ HTML / CSS / JavaScript</li>
            <li>✔ Python Projects</li>
            <li>✔ Java Projects</li>
            <li>✔ C / C++ Projects</li>
        </ul>
    </div>

</section>
